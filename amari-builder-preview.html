<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amari Builder — Interactive Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: #0f0f1a; overflow: hidden; }

/* ── VARIABLES ───────────────────────────────────────────── */
:root {
  --bg:         #0f0f1a;
  --panel:      #16162a;
  --panel-alt:  #1e1e35;
  --toolbar:    #0a0a16;
  --border:     rgba(255,255,255,0.08);
  --text:       #e8e8f0;
  --muted:      #8888a8;
  --accent:     #e94560;
  --accent2:    #6366f1;
  --canvas-bg:  #eef0f4;
  --r:          8px;
  --h-toolbar:  52px;
  --w-left:     272px;
  --w-right:    300px;
}

/* ── LAYOUT ──────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; color: var(--text); font-size: 13px; }

/* ── TOOLBAR ─────────────────────────────────────────────── */
.toolbar {
  height: var(--h-toolbar); background: var(--toolbar);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; flex-shrink: 0; gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.35);
}
.tb-left, .tb-center, .tb-right { display: flex; align-items: center; gap: 6px; }
.logo { font-weight: 800; font-size: 1.05rem; color: #fff; padding-right: 14px; border-right: 1px solid var(--border); margin-right: 6px; }
.logo span { color: var(--accent); }
.page-name { color: var(--muted); font-size: 0.78rem; }

.tb-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 11.5px; font-weight: 500;
  cursor: pointer; transition: all .18s; font-family: inherit;
  white-space: nowrap;
}
.tb-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,.2); color: #fff; }
.tb-btn.active { background: rgba(233,69,96,.12); border-color: var(--accent); color: var(--accent); }
.tb-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.save-btn { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; font-weight: 700 !important; padding: 6px 20px !important; }
.save-btn:hover { background: #d63251 !important; box-shadow: 0 4px 14px rgba(233,69,96,.4) !important; }

/* ── MAIN AREA ───────────────────────────────────────────── */
.main { flex: 1; display: grid; grid-template-columns: var(--w-left) 1fr var(--w-right); min-height: 0; }

/* ── LEFT PANEL ──────────────────────────────────────────── */
.panel-left {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.panel-tab {
  flex: 1; padding: 10px 4px; background: none; border: none;
  color: var(--muted); font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px; cursor: pointer;
  border-bottom: 2px solid transparent; font-family: inherit; transition: all .18s;
}
.panel-tab:hover { color: var(--text); }
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.panel-body { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.08) transparent; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.search-box {
  width: 100%; padding: 8px 11px;
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 12px;
  font-family: inherit; outline: none; margin-bottom: 14px;
  transition: border-color .18s;
}
.search-box:focus { border-color: var(--accent2); }
.search-box::placeholder { color: var(--muted); }

.group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 10px 2px 6px; font-weight: 700; }

.el-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.el-tile {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 13px 8px; background: rgba(255,255,255,.04);
  border: 1px solid var(--border); border-radius: var(--r);
  cursor: grab; transition: all .18s; text-align: center; user-select: none;
}
.el-tile:hover { background: rgba(233,69,96,.1); border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,.18); }
.el-tile:active { cursor: grabbing; }
.el-tile svg { width: 20px; height: 20px; stroke: var(--muted); transition: stroke .18s; }
.el-tile:hover svg { stroke: var(--accent); }
.el-tile .el-label { font-size: 10.5px; font-weight: 600; color: var(--muted); transition: color .18s; line-height: 1.2; }
.el-tile:hover .el-label { color: var(--accent); }

/* ── CANVAS AREA ─────────────────────────────────────────── */
.canvas-wrap {
  background: var(--canvas-bg);
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto; overflow-x: hidden; padding: 28px 20px;
  position: relative; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.12) transparent;
}
.canvas-wrap::-webkit-scrollbar { width: 6px; }
.canvas-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 3px; }

.canvas {
  background: #fff; box-shadow: 0 4px 32px rgba(0,0,0,.14);
  width: 100%; max-width: 980px; min-height: 480px;
  transition: max-width .3s; position: relative; border-radius: 2px;
}
.canvas.tablet  { max-width: 768px; }
.canvas.mobile  { max-width: 390px; }

/* ── SECTIONS IN CANVAS ──────────────────────────────────── */
.ab-section {
  position: relative; border: 1px solid transparent;
  transition: border-color .18s; min-height: 60px; cursor: default;
}
.ab-section:hover { border-color: rgba(99,102,241,.35); }
.ab-section.selected { border-color: var(--accent2); }

.ab-sec-label {
  position: absolute; top: 0; left: 0;
  background: var(--accent2); color: #fff;
  font-size: 9px; font-weight: 800; padding: 3px 10px;
  border-radius: 0 0 6px 0; text-transform: uppercase; letter-spacing: .5px;
  opacity: 0; transition: opacity .18s; cursor: move; display: flex; align-items: center; gap: 5px;
}
.ab-section:hover .ab-sec-label, .ab-section.selected .ab-sec-label { opacity: 1; }

.ab-sec-controls {
  position: absolute; top: 0; right: 0;
  background: var(--accent2); border-radius: 0 0 0 6px;
  padding: 4px; display: flex; gap: 3px;
  opacity: 0; transition: opacity .18s; z-index: 10;
}
.ab-section:hover .ab-sec-controls, .ab-section.selected .ab-sec-controls { opacity: 1; }

.ctrl { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; border-radius: 4px; color: rgba(255,255,255,.75); font-size: 11px; transition: all .15s; }
.ctrl:hover { background: rgba(255,255,255,.2); color: #fff; }
.ctrl.del:hover { background: rgba(239,68,68,.35); }
.ctrl svg { width: 12px; height: 12px; }

.ab-row { display: flex; position: relative; min-height: 40px; border: 1px dashed transparent; transition: border-color .18s; }
.ab-row:hover { border-color: rgba(99,102,241,.25); }

.ab-col {
  flex: 1; min-height: 50px; padding: 6px; position: relative;
  border: 1px dashed transparent; transition: all .18s;
}
.ab-col:hover { border-color: rgba(99,102,241,.2); }
.ab-col.drop-over { background: rgba(99,102,241,.06); border-color: var(--accent2); border-style: solid; }

.col-hint {
  min-height: 52px; border: 2px dashed #d5d9e0; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 11px; margin: 4px; pointer-events: none;
  transition: all .18s;
}
.ab-col.drop-over .col-hint { border-color: var(--accent2); color: var(--accent2); background: rgba(99,102,241,.04); }

/* ── CANVAS ELEMENTS ──────────────────────────────────────── */
.ab-el {
  position: relative; margin: 3px 0; border: 1px solid transparent;
  border-radius: 5px; transition: border-color .15s; cursor: pointer;
}
.ab-el:hover { border-color: rgba(233,69,96,.4); }
.ab-el.selected { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(233,69,96,.15); }

.el-controls {
  position: absolute; top: -1px; right: -1px;
  background: var(--accent); border-radius: 0 5px 0 6px;
  padding: 3px; display: none; gap: 2px; z-index: 10;
}
.ab-el:hover .el-controls, .ab-el.selected .el-controls { display: flex; }

.el-preview { pointer-events: none; padding: 5px; }

/* ── ADD SECTION BAR ──────────────────────────────────────── */
.add-sec-bar { display: flex; justify-content: center; padding: 14px; border-top: 1px solid #e8eaed; }
.add-sec-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 24px; background: none; border: 2px dashed #cdd1d9;
  border-radius: 7px; color: #aaa; cursor: pointer; font-size: 0.82rem;
  font-weight: 700; transition: all .2s; font-family: inherit;
}
.add-sec-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(99,102,241,.05); }

/* ── EMPTY STATE ──────────────────────────────────────────── */
.empty-canvas {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; min-height: 360px; gap: 12px;
  color: #bbb; text-align: center; padding: 40px;
}
.empty-canvas svg { stroke: #d5d9e0; }
.empty-canvas h3 { color: #999; margin: 0; font-size: 1.1rem; }
.empty-canvas p { font-size: 0.82rem; max-width: 240px; color: #bbb; }
.start-btn {
  background: var(--accent2); color: #fff; border: none;
  padding: 11px 26px; border-radius: 7px; cursor: pointer;
  font-weight: 700; font-size: 0.85rem; transition: all .2s; font-family: inherit;
}
.start-btn:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.35); }

/* ── RIGHT PANEL ──────────────────────────────────────────── */
.panel-right {
  background: var(--panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#settings-title { font-weight: 700; font-size: 0.83rem; color: var(--text); }
.settings-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; }
.settings-close:hover { background: rgba(255,255,255,.08); color: var(--text); }

.settings-body { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.08) transparent; }
.settings-body::-webkit-scrollbar { width: 4px; }
.settings-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.settings-empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 0.82rem; line-height: 1.6; }
.settings-empty svg { stroke: rgba(255,255,255,.15); margin-bottom: 12px; }

.ctrl-group { margin-bottom: 14px; }
.ctrl-group label { display: block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
.ctrl-group input[type=text], .ctrl-group select, .ctrl-group textarea {
  width: 100%; padding: 7px 10px;
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 12px;
  font-family: inherit; outline: none; transition: border-color .18s;
}
.ctrl-group input:focus, .ctrl-group select:focus, .ctrl-group textarea:focus { border-color: var(--accent2); }
.ctrl-group select option { background: #1e1e35; }
.ctrl-group textarea { resize: vertical; min-height: 72px; }

.color-row { display: flex; gap: 7px; align-items: center; }
.color-row input[type=color] { width: 36px !important; height: 32px !important; padding: 2px !important; border-radius: 5px !important; cursor: pointer; flex-shrink: 0; }
.color-row input[type=text] { flex: 1; }

.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle { position: relative; width: 34px; height: 18px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.tog-slider { position: absolute; inset: 0; background: rgba(255,255,255,.1); border-radius: 18px; cursor: pointer; transition: background .18s; }
.tog-slider::before { content:''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .18s; }
.toggle input:checked + .tog-slider { background: var(--accent); }
.toggle input:checked + .tog-slider::before { transform: translateX(16px); }
.tog-label { font-size: 12px; color: var(--text); }

.settings-sep { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.settings-sec { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; padding: 6px 0 4px; }

.img-preview-box {
  width: 100%; height: 100px; border: 2px dashed var(--border); border-radius: 7px;
  background: rgba(255,255,255,.04); display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 11px; margin-bottom: 7px; cursor: pointer; transition: border-color .18s;
}
.img-preview-box:hover { border-color: var(--accent); }
.img-pick-btn {
  width: 100%; padding: 7px; background: rgba(255,255,255,.06); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 11.5px; cursor: pointer; font-family: inherit; transition: all .18s;
}
.img-pick-btn:hover { background: rgba(255,255,255,.1); }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .15s ease;
}
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  width: 580px; max-width: 95vw; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(0,0,0,.6); animation: slideUp .2s ease;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 0.92rem; color: #fff; margin: 0; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 17px; cursor: pointer; padding: 3px 7px; border-radius: 4px; }
.modal-close:hover { background: rgba(255,255,255,.08); color: #fff; }
.modal-body { padding: 20px; }
.modal-body p { color: var(--muted); font-size: 11.5px; margin-bottom: 14px; }

.layout-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.layout-opt {
  border: 2px solid var(--border); border-radius: var(--r); padding: 14px 10px;
  cursor: pointer; transition: all .18s; text-align: center; background: rgba(255,255,255,.03);
}
.layout-opt:hover { background: rgba(233,69,96,.1); border-color: var(--accent); }
.layout-preview { display: flex; gap: 3px; margin-bottom: 8px; height: 28px; }
.layout-preview > div { background: rgba(255,255,255,.18); border-radius: 3px; }
.layout-opt:hover .layout-preview > div { background: rgba(233,69,96,.4); }
.layout-name { font-size: 10px; color: var(--muted); font-weight: 700; }
.layout-opt:hover .layout-name { color: var(--accent); }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: #1e1e35; color: #fff; padding: 9px 22px; border-radius: 20px;
  font-size: 12px; font-weight: 700; z-index: 99999; box-shadow: 0 4px 20px rgba(0,0,0,.45);
  animation: fadeIn .2s ease; white-space: nowrap;
}
.toast.success { background: #22c55e; }
.toast.error   { background: #ef4444; }

/* ── DRAG GHOST ──────────────────────────────────────────── */
#drag-ghost {
  position: fixed; pointer-events: none; z-index: 99999;
  background: var(--panel); border: 2px solid var(--accent);
  border-radius: 8px; padding: 7px 14px; display: flex; align-items: center;
  gap: 8px; font-size: 12px; font-weight: 700; color: var(--accent);
  box-shadow: 0 8px 24px rgba(0,0,0,.5); display: none;
}
#drag-ghost svg { width: 15px; height: 15px; stroke: var(--accent); }

@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

/* ── STATUS PILL ─────────────────────────────────────────── */
.status-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
</style>
</head>
<body>
<div id="app">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="tb-left">
      <span class="logo">⚡ Amari<span>.</span></span>
      <span class="page-name" id="page-name">Homepage</span>
    </div>
    <div class="tb-center">
      <button class="tb-btn active" id="v-desktop" onclick="setView('desktop')" title="Desktop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="tb-btn" id="v-tablet" onclick="setView('tablet')" title="Tablet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
      </button>
      <button class="tb-btn" id="v-mobile" onclick="setView('mobile')" title="Mobile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </button>
    </div>
    <div class="tb-right">
      <div class="status-pill"><span class="status-dot"></span> <span id="save-status">All changes saved</span></div>
      <button class="tb-btn" onclick="undo()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.96"/></svg>
        Undo
      </button>
      <button class="tb-btn" onclick="doRedo()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.96"/></svg>
        Redo
      </button>
      <button class="tb-btn" onclick="showToast('Opening preview...','')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview
      </button>
      <button class="tb-btn save-btn" onclick="save()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT PANEL -->
    <div class="panel-left">
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchTab('elements',this)">Elements</button>
        <button class="panel-tab" onclick="switchTab('layout',this)">Layout</button>
        <button class="panel-tab" onclick="switchTab('page',this)">Page</button>
      </div>
      <div class="panel-body" id="panel-elements">
        <input class="search-box" type="text" placeholder="🔍 Search elements..." oninput="filterElements(this.value)">
        <div id="palette"></div>
      </div>
      <div class="panel-body" id="panel-layout" style="display:none">
        <div style="color:var(--muted);font-size:11px;padding:4px 2px 12px;">Page structure — click to navigate</div>
        <div id="layout-tree"></div>
      </div>
      <div class="panel-body" id="panel-page" style="display:none">
        <div class="ctrl-group"><label>Page Title</label><input type="text" id="pg-title" value="Homepage" oninput="document.getElementById('page-name').textContent=this.value"></div>
        <div class="ctrl-group"><label>Header Style</label><select><option>Default</option><option>Transparent</option><option>Hidden</option></select></div>
        <div class="ctrl-group"><label>Footer</label><select><option>Default</option><option>Hidden</option></select></div>
        <div class="ctrl-group"><label>Body Background</label><div class="color-row"><input type="color" value="#ffffff"><input type="text" value="#ffffff"></div></div>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap">
      <div class="canvas" id="canvas">
        <div id="canvas-inner"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel-right">
      <div class="settings-header">
        <span id="settings-title">Settings</span>
        <button class="settings-close" onclick="clearSelection()">✕</button>
      </div>
      <div class="settings-body" id="settings-body">
        <div class="settings-empty">

<script>

/* =====================================================================

  spacer:     { label:'Spacer',        group:'Basic',       icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="4" x2="12" y2="20"/><line x1="6" y1="4" x2="18" y2="4"/><line x1="6" y1="20" x2="18" y2="20"/></svg>', defaults:{ height:'40px' } },

  'portfolio-grid':{ label:'Portfolio', group:'Advanced',   icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>', defaults:{ columns:'3', posts_per_page:'9' } },
  'contact-form':{ label:'Contact Form', group:'Interactive', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>', defaults:{ submit_text:'Send Message', show_name:true, show_phone:false } },
  testimonial:{ label:'Testimonial',   group:'Advanced',    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>', defaults:{ quote:'Great service! Highly recommended.', name:'Jane Smith', role:'CEO, Acme Corp', rating:'5' } },
  'code-block':{ label:'Custom Code',  group:'Advanced',    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>', defaults:{ code:'', execute:true } },
};

const CONTROLS = {
  heading:    [
    { id:'text', type:'text', label:'Heading Text' },
    { id:'tag', type:'select', label:'HTML Tag', options:['h1','h2','h3','h4','h5','h6'] },
    { id:'align', type:'select', label:'Alignment', options:['left','center','right'] },
    { id:'color', type:'color', label:'Text Color' },
    { id:'font_size', type:'text', label:'Font Size', placeholder:'e.g. 2.5rem' },
    { id:'font_weight', type:'select', label:'Font Weight', options:['300','400','600','700','800'] },
  ],
  'text-block':[ { id:'content', type:'textarea', label:'Content (HTML ok)' }, { id:'align', type:'select', label:'Align', options:['','left','center','right'] }, { id:'color', type:'color', label:'Text Color' } ],
  button:[ { id:'label', type:'text', label:'Button Text' }, { id:'url', type:'text', label:'URL' }, { id:'style', type:'select', label:'Style', options:['primary','secondary','ghost'] }, { id:'size', type:'select', label:'Size', options:['','sm','lg'] }, { id:'align', type:'select', label:'Alignment', options:['left','center','right'] } ],
  image:[ { id:'url', type:'text', label:'Image URL', placeholder:'https://...' }, { id:'alt', type:'text', label:'Alt Text' }, { id:'align', type:'select', label:'Align', options:['left','center','right'] }, { id:'width', type:'text', label:'Width', placeholder:'100%' }, { id:'border_radius', type:'text', label:'Border Radius', placeholder:'8px' } ],
  video:[ { id:'source', type:'select', label:'Source', options:['youtube','vimeo','self'] }, { id:'url', type:'text', label:'Video URL' }, { id:'ratio', type:'select', label:'Aspect Ratio', options:['16-9','4-3','1-1'] } ],
  spacer:[ { id:'height', type:'text', label:'Height', placeholder:'40px' } ],
  divider:[ { id:'style', type:'select', label:'Style', options:['solid','dashed','dotted'] }, { id:'color', type:'color', label:'Color' }, { id:'thickness', type:'text', label:'Thickness', placeholder:'1px' } ],
  'icon-box':[ { id:'icon', type:'text', label:'Icon / Emoji' }, { id:'title', type:'text', label:'Title' }, { id:'content', type:'textarea', label:'Description' }, { id:'align', type:'select', label:'Align', options:['left','center','right'] }, { id:'icon_color', type:'color', label:'Icon Color' }, { id:'icon_size', type:'text', label:'Icon Size', placeholder:'2rem' } ],
  'portfolio-grid':[ { id:'columns', type:'select', label:'Columns', options:['2','3','4'] } ],
  'contact-form':[ { id:'submit_text', type:'text', label:'Button Text' }, { id:'show_name', type:'toggle', label:'Show Name Field' }, { id:'show_phone', type:'toggle', label:'Show Phone Field' } ],
  testimonial:[ { id:'quote', type:'textarea', label:'Quote' }, { id:'name', type:'text', label:'Name' }, { id:'role', type:'text', label:'Role / Company' }, { id:'rating', type:'select', label:'Stars', options:['','5','4','3'] } ],
  'code-block':[ { id:'code', type:'textarea', label:'HTML / Code' } ],
};

const LAYOUTS = [
  { key:'1-1', label:'1 Column', cols:[{s:'1-1',f:1}] },
  { key:'1-2+1-2', label:'2 Columns', cols:[{s:'1-2',f:1},{s:'1-2',f:1}] },
  { key:'1-3+1-3+1-3', label:'3 Columns', cols:[{s:'1-3',f:1},{s:'1-3',f:1},{s:'1-3',f:1}] },
  { key:'1-4x4', label:'4 Columns', cols:[{s:'1-4',f:1},{s:'1-4',f:1},{s:'1-4',f:1},{s:'1-4',f:1}] },
  { key:'2-3+1-3', label:'2/3 + 1/3', cols:[{s:'2-3',f:2},{s:'1-3',f:1}] },
  { key:'1-3+2-3', label:'1/3 + 2/3', cols:[{s:'1-3',f:1},{s:'2-3',f:2}] },
  { key:'1-4+3-4', label:'1/4 + 3/4', cols:[{s:'1-4',f:1},{s:'3-4',f:3}] },
];

/* =====================================================================
   PALETTE
   ===================================================================== */
function buildPalette() {
  const pal = document.getElementById('palette');
  const groups = {};
  Object.entries(ELEMENTS).forEach(([type, cfg]) => {
    if (!groups[cfg.group]) groups[cfg.group] = [];
    groups[cfg.group].push({ type, ...cfg });
  });
  pal.innerHTML = '';
  Object.entries(groups).forEach(([g, els]) => {
    const lbl = document.createElement('div'); lbl.className = 'group-label'; lbl.textContent = g;
    pal.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'el-grid';
    els.forEach(el => {
      const t = document.createElement('div');
      t.className = 'el-tile'; t.dataset.type = el.type;
      t.innerHTML = `${el.icon}<span class="el-label">${el.label}</span>`;
      t.addEventListener('mousedown', e => startDrag(e, el.type, el.label, el.icon));
      t.addEventListener('dblclick', () => quickAddElement(el.type));
      grid.appendChild(t);
    });
    pal.appendChild(grid);
  });
}

function filterElements(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.el-tile').forEach(t => {
    t.style.display = t.querySelector('.el-label').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.group-label').forEach(lbl => {
    const grid = lbl.nextElementSibling;
    if (!grid) return;
    const vis = [...grid.querySelectorAll('.el-tile')].some(t => t.style.display !== 'none');
    lbl.style.display = grid.style.display = vis ? '' : 'none';
  });
}

/* =====================================================================
   DRAG & DROP
   ===================================================================== */
function startDrag(e, type, label, icon) {
  e.preventDefault();
  dragType = type;
  const ghost = document.getElementById('drag-ghost');
  ghost.innerHTML = `${icon}<span>${label}</span>`;
  ghost.style.display = 'flex';
  moveDragGhost(e);

  const onMove = ev => { moveDragGhost(ev); updateDropTarget(ev); };
  const onUp   = ev => {
    ghost.style.display = 'none';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.querySelectorAll('.ab-col').forEach(c => c.classList.remove('drop-over'));
    if (dragType && dragTarget) {
      addElement(dragType, dragTarget);
    }
    dragType = null; dragTarget = null;
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function moveDragGhost(e) {
  const g = document.getElementById('drag-ghost');
  g.style.left = (e.clientX + 14) + 'px';
  g.style.top  = (e.clientY - 12) + 'px';
}

function updateDropTarget(e) {
  document.querySelectorAll('.ab-col').forEach(c => c.classList.remove('drop-over'));
  const col = e.target.closest('.ab-col');
  if (col) { col.classList.add('drop-over'); dragTarget = { colId: col.dataset.colId, rowId: col.dataset.rowId, sectionId: col.dataset.sectionId }; }
  else dragTarget = null;
}

/* =====================================================================
   RENDER
   ===================================================================== */
function render() {
  const inner = document.getElementById('canvas-inner');
  inner.innerHTML = '';
  if (!data.sections.length) {
    inner.innerHTML = `
      <div class="empty-canvas">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
        <h3>Start Building</h3>
        <p>Add your first section to begin designing your page.</p>
        <button class="start-btn" onclick="openModal(layout => addSection(layout))">+ Add Section</button>
      </div>`;
    return;
  }
  data.sections.forEach(sec => inner.appendChild(renderSection(sec)));
  const bar = document.createElement('div'); bar.className = 'add-sec-bar';
  bar.innerHTML = `<button class="add-sec-btn" onclick="openModal(l=>addSection(l))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Section</button>`;
  inner.appendChild(bar);
  rebuildTree();
}

function renderSection(sec) {
  const el = document.createElement('div');
  el.className = 'ab-section' + (selected?.type === 'section' && selected?.id === sec.id ? ' selected' : '');
  el.dataset.sectionId = sec.id;
  const s = sec.settings || {};
  if (s.bg_color) el.style.background = s.bg_color;
  if (s.padding)  el.style.padding = s.padding;

  el.innerHTML = `
    <div class="ab-sec-label">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="9" cy="19" r="2"/><circle cx="15" cy="5" r="2"/><circle cx="15" cy="12" r="2"/><circle cx="15" cy="19" r="2"/></svg>
      Section
    </div>
    <div class="ab-sec-controls">
      <button class="ctrl" title="Settings" onclick="selectSection('${sec.id}')">⚙</button>
      <button class="ctrl" title="Move Up" onclick="moveSection('${sec.id}',-1)">↑</button>
      <button class="ctrl" title="Move Down" onclick="moveSection('${sec.id}',1)">↓</button>
      <button class="ctrl" title="Duplicate" onclick="dupSection('${sec.id}')">⧉</button>
      <button class="ctrl del" title="Delete" onclick="delSection('${sec.id}')">✕</button>
    </div>`;

  const rowsWrap = document.createElement('div');
  rowsWrap.style.cssText = 'padding:8px;';
  (sec.rows || []).forEach(row => rowsWrap.appendChild(renderRow(row, sec)));
  el.appendChild(rowsWrap);

  const addRow = document.createElement('div');
  addRow.style.cssText = 'text-align:center;padding:4px 8px 8px;';
  addRow.innerHTML = `<button class="ctrl" style="font-size:10px;padding:4px 10px;width:auto;" onclick="openModal(l=>addRow('${sec.id}',l))">+ Row</button>`;
  el.appendChild(addRow);

  return el;
}

function renderRow(row, sec) {
  const el = document.createElement('div');
  el.className = 'ab-row'; el.dataset.rowId = row.id; el.dataset.sectionId = sec.id;
  (row.columns || []).forEach(col => el.appendChild(renderCol(col, row, sec)));
  return el;
}

function renderCol(col, row, sec) {
  const el = document.createElement('div');
  el.className = 'ab-col'; el.dataset.colId = col.id; el.dataset.rowId = row.id; el.dataset.sectionId = sec.id;
  el.style.flex = col.flex || 1;
  if (!col.elements || !col.elements.length) {
    const hint = document.createElement('div'); hint.className = 'col-hint'; hint.textContent = 'Drag element here'; el.appendChild(hint);
  }
  (col.elements || []).forEach(e => el.appendChild(renderElement(e, col, row, sec)));
  return el;
}

function renderElement(elem, col, row, sec) {
  const el = document.createElement('div');
  el.className = 'ab-el' + (selected?.type === 'element' && selected?.id === elem.id ? ' selected' : '');
  el.dataset.elementId = elem.id;

  el.innerHTML = `
    <div class="el-controls">
      <button class="ctrl" onclick="moveEl('${elem.id}',-1);event.stopPropagation()">↑</button>
      <button class="ctrl" onclick="moveEl('${elem.id}',1);event.stopPropagation()">↓</button>
      <button class="ctrl" onclick="dupEl('${elem.id}');event.stopPropagation()">⧉</button>
      <button class="ctrl del" onclick="delEl('${elem.id}');event.stopPropagation()">✕</button>
    </div>
    <div class="el-preview">${getPreview(elem)}</div>`;

  el.addEventListener('click', e => { if (!e.target.closest('.ctrl')) selectElement(elem.id); });
  return el;
}

function getPreview(elem) {
  const s = Object.assign({}, ELEMENTS[elem.type]?.defaults || {}, elem.settings || {});
  switch (elem.type) {
    case 'heading': {
      const tag = s.tag||'h2', fz={h1:'2rem',h2:'1.6rem',h3:'1.3rem',h4:'1.1rem',h5:'1rem',h6:'.9rem'}[tag]||'1.5rem';
      return `<${tag} style="font-size:${s.font_size||fz};color:${s.color||'#1a1a2e'};text-align:${s.align||'left'};margin:0;font-weight:${s.font_weight||700};">${s.text||'Heading'}</${tag}>`;
    }
    case 'text-block': return `<div style="color:${s.color||'#333'};font-size:.9rem;text-align:${s.align||'left'};max-height:80px;overflow:hidden;">${s.content||'<p>Text content...</p>'}</div>`;
    case 'button': {
      const bg = s.style==='secondary'?'transparent':'#e94560', tc = s.style==='secondary'?'#1a1a2e':'#fff', border = s.style==='secondary'?'2px solid #1a1a2e':'2px solid #e94560';
      return `<div style="text-align:${s.align||'left'};padding:4px 0;"><span style="display:inline-block;padding:9px 22px;background:${bg};color:${tc};border:${border};border-radius:6px;font-size:.85rem;font-weight:700;">${s.label||'Button'}</span></div>`;
    }
    case 'image': return s.url ? `<div style="text-align:${s.align||'center'};"><img src="${s.url}" style="max-width:${s.width||'100%'};max-height:140px;border-radius:${s.border_radius||'0'};display:inline-block;"></div>`
      : `<div style="background:#f5f5f7;border:2px dashed #ddd;padding:24px;text-align:center;border-radius:8px;color:#aaa;font-size:.8rem;">📷 No image selected</div>`;
    case 'video': return `<div style="background:#111;border-radius:8px;padding:24px;text-align:center;color:#fff;font-size:.8rem;">▶ Video: ${(s.url||'No URL set').slice(0,45)}</div>`;
    case 'spacer': return `<div style="background:repeating-linear-gradient(45deg,#f8f8f8,#f8f8f8 5px,#efefef 5px,#efefef 10px);height:${s.height||'40px'};border-radius:4px;display:flex;align-items:center;justify-content:center;"><span style="background:#fff;padding:1px 8px;border-radius:3px;font-size:10px;color:#999;">${s.height||'40px'}</span></div>`;
    case 'divider': return `<hr style="border:none;border-top:${s.thickness||'1px'} ${s.style||'solid'} ${s.color||'#e5e7eb'};margin:8px 0;">`;
    case 'icon-box': return `<div style="text-align:${s.align||'center'};padding:8px 4px;"><div style="font-size:${s.icon_size||'2rem'};color:${s.icon_color||'#e94560'};">${s.icon||'⭐'}</div><h4 style="font-size:.95rem;margin:6px 0 4px;color:#1a1a2e;">${s.title||'Icon Box'}</h4><p style="font-size:.8rem;color:#666;margin:0;">${(s.content||'').slice(0,80)}</p></div>`;
    case 'portfolio-grid': return `<div style="display:grid;grid-template-columns:repeat(${s.columns||3},1fr);gap:8px;padding:4px;"><div style="background:#f0f2f5;border-radius:6px;aspect-ratio:4/3;"></div><div style="background:#f0f2f5;border-radius:6px;aspect-ratio:4/3;"></div><div style="background:#f0f2f5;border-radius:6px;aspect-ratio:4/3;"></div></div><p style="text-align:center;font-size:.72rem;color:#999;margin:6px 0 2px;">Portfolio Grid — ${s.columns||3} Columns</p>`;
    case 'contact-form': return `<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;"><div style="background:#fff;border:1px solid #ddd;border-radius:5px;padding:7px 10px;font-size:.75rem;color:#999;">Name</div><div style="background:#fff;border:1px solid #ddd;border-radius:5px;padding:7px 10px;font-size:.75rem;color:#999;">Email</div></div><div style="background:#fff;border:1px solid #ddd;border-radius:5px;padding:7px 10px;font-size:.75rem;color:#999;margin-bottom:8px;">Message...</div><span style="background:#e94560;color:#fff;padding:6px 14px;border-radius:5px;font-size:.75rem;font-weight:700;">${s.submit_text||'Send Message'}</span></div>`;
    case 'testimonial': return `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;"><div style="color:#f59e0b;margin-bottom:8px;font-size:.95rem;">${'★'.repeat(parseInt(s.rating)||5)}</div><p style="font-style:italic;font-size:.82rem;color:#555;margin-bottom:10px;">"${(s.quote||'').slice(0,80)}"</p><strong style="font-size:.82rem;">${s.name||'Name'}</strong> <span style="font-size:.77rem;color:#999;">${s.role||''}</span></div>`;
    case 'code-block': return `<div style="background:#1a1a2e;color:#7dd3fc;font-family:monospace;padding:12px;border-radius:6px;font-size:.78rem;">&lt;/&gt; Custom Code Block</div>`;
    default: return `<div style="padding:12px;background:#f5f5f7;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:.82rem;color:#666;">${ELEMENTS[elem.type]?.label||elem.type}</div>`;
  }
}

/* =====================================================================
   ACTIONS
   ===================================================================== */
function addSection(layout) {
  const lo = LAYOUTS.find(l => l.key === layout) || LAYOUTS[0];
  data.sections.push({
    id: uid(), settings: { bg_color:'', padding:'40px 0' },
    rows: [{ id: uid(), columns: lo.cols.map(c => ({ id: uid(), size: c.s, flex: c.f, elements: [] })) }]
  });
  commit();
}

function addRow(sectionId, layout) {
  const sec = data.sections.find(s => s.id === sectionId);
  if (!sec) return;
  const lo = LAYOUTS.find(l => l.key === layout) || LAYOUTS[0];
  sec.rows.push({ id: uid(), columns: lo.cols.map(c => ({ id: uid(), size: c.s, flex: c.f, elements: [] })) });
  commit();
}

function addElement(type, { colId, rowId, sectionId }) {
  const col = findCol(colId);
  if (!col) return;
  const elem = { id: uid(), type, settings: deep(ELEMENTS[type]?.defaults || {}) };
  col.elements.push(elem);
  commit();
  selectElement(elem.id);
}

function quickAddElement(type) {
  if (!data.sections.length) { addSection('1-1'); }
  const sec = data.sections[data.sections.length - 1];
  const row = sec.rows[sec.rows.length - 1];
  const col = row.columns[0];
  const elem = { id: uid(), type, settings: deep(ELEMENTS[type]?.defaults || {}) };
  col.elements.push(elem);
  commit();
  selectElement(elem.id);
}

function delSection(id) { if (!confirm('Delete this section and all its content?')) return; data.sections = data.sections.filter(s => s.id !== id); commit(); clearSelection(); }
function dupSection(id) { const i = data.sections.findIndex(s=>s.id===id); if(i===-1)return; const c=deep(data.sections[i]); c.id=uid(); c.rows.forEach(r=>{r.id=uid();r.columns.forEach(col=>{col.id=uid();col.elements.forEach(e=>e.id=uid());})}); data.sections.splice(i+1,0,c); commit(); }
function moveSection(id, dir) { const arr=data.sections, i=arr.findIndex(s=>s.id===id); if(i+dir<0||i+dir>=arr.length)return; [arr[i],arr[i+dir]]=[arr[i+dir],arr[i]]; commit(); }
function selectSection(id) { selected={type:'section',id}; const sec=data.sections.find(s=>s.id===id); if(sec)renderSectionSettings(sec); render(); }
function delEl(id) { if(!confirm('Delete this element?'))return; forEach_(id,'el',arr=>{ const i=arr.findIndex(e=>e.id===id); if(i!==-1){arr.splice(i,1);commit();clearSelection();} }); }
function dupEl(id) { forEach_(id,'el',(arr,i)=>{ const c=deep(arr[i]); c.id=uid(); arr.splice(i+1,0,c); commit(); }); }
function moveEl(id,dir) { forEach_(id,'el',(arr,i)=>{ if(i+dir<0||i+dir>=arr.length)return; [arr[i],arr[i+dir]]=[arr[i+dir],arr[i]]; commit(); }); }

function forEach_(id, type, cb) {
  for (const sec of data.sections) for (const row of sec.rows) for (const col of row.columns) {
    const i = col.elements.findIndex(e=>e.id===id);
    if (i!==-1) { cb(col.elements, i); return; }
  }
}

function findCol(id) {
  for (const sec of data.sections) for (const row of sec.rows) { const c = row.columns.find(c=>c.id===id); if(c) return c; }
}
function findElem(id) {
  for (const sec of data.sections) for (const row of sec.rows) for (const col of row.columns) { const e=col.elements.find(e=>e.id===id); if(e) return e; }
}

/* =====================================================================
   SELECTION & SETTINGS
   ===================================================================== */
function selectElement(id) {
  selected = { type:'element', id };
  const elem = findElem(id);
  if (elem) renderElementSettings(elem);
  render();
}

function clearSelection() { selected = null; document.getElementById('settings-title').textContent = 'Settings'; document.getElementById('settings-body').innerHTML = `<div class="settings-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><p style="margin-top:12px;">Click any element to edit settings.</p></div>`; render(); }

function renderElementSettings(elem) {
  const cfg = ELEMENTS[elem.type]; if(!cfg) return;
  document.getElementById('settings-title').textContent = cfg.label + ' Settings';
  const body = document.getElementById('settings-body');
  body.innerHTML = '';
  const ctrls = CONTROLS[elem.type] || [];
  const s = Object.assign({}, cfg.defaults, elem.settings || {});
  ctrls.forEach(ctrl => { body.appendChild(buildControl(ctrl, s[ctrl.id], elem)); });
}

function renderSectionSettings(sec) {
  document.getElementById('settings-title').textContent = 'Section Settings';
  const body = document.getElementById('settings-body');
  body.innerHTML = '';
  const s = sec.settings || {};
  const ctrls = [
    { id:'bg_color',  type:'color', label:'Background Color' },
    { id:'padding',   type:'text',  label:'Padding', placeholder:'40px 0' },
    { id:'min_height',type:'text',  label:'Min Height', placeholder:'500px' },
  ];
  ctrls.forEach(ctrl => { body.appendChild(buildControl(ctrl, s[ctrl.id]||'', sec, 'section')); });
}

function buildControl(ctrl, value, target, ttype='element') {
  const div = document.createElement('div'); div.className = 'ctrl-group'; div.dataset.ctrlId = ctrl.id;
  const lbl = document.createElement('label'); lbl.textContent = ctrl.label; div.appendChild(lbl);

  let inp;
  if (ctrl.type === 'color') {
    const row = document.createElement('div'); row.className = 'color-row';
    const cp = document.createElement('input'); cp.type = 'color'; cp.value = value || '#333333';
    const ct = document.createElement('input'); ct.type = 'text'; ct.value = value || ''; ct.placeholder = '#000000';
    cp.addEventListener('input', () => { ct.value = cp.value; updateSetting(ctrl.id, cp.value, target, ttype); });
    ct.addEventListener('input', () => { if(/^#[0-9a-f]{6}$/i.test(ct.value)){cp.value=ct.value;} updateSetting(ctrl.id, ct.value, target, ttype); });
    row.appendChild(cp); row.appendChild(ct); div.appendChild(row);
    return div;
  } else if (ctrl.type === 'select') {
    inp = document.createElement('select');
    (ctrl.options||[]).forEach(o => { const opt=document.createElement('option'); opt.value=o; opt.textContent=o; if((value||'')==o)opt.selected=true; inp.appendChild(opt); });
  } else if (ctrl.type === 'textarea') {
    inp = document.createElement('textarea'); inp.value = value||''; inp.rows=4;
  } else if (ctrl.type === 'toggle') {
    const row = document.createElement('div'); row.className = 'toggle-row';
    const label = document.createElement('label'); label.className = 'toggle';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.checked = value===true||value==='true';
    const slider = document.createElement('span'); slider.className = 'tog-slider';
    label.appendChild(cb); label.appendChild(slider);
    const lbl2 = document.createElement('span'); lbl2.className='tog-label'; lbl2.textContent=ctrl.label;
    div.removeChild(lbl);
    row.appendChild(label); row.appendChild(lbl2); div.appendChild(row);
    cb.addEventListener('change', () => updateSetting(ctrl.id, cb.checked, target, ttype));
    return div;
  } else {
    inp = document.createElement('input'); inp.type='text'; inp.value=value||''; inp.placeholder=ctrl.placeholder||'';
  }
  inp && div.appendChild(inp);
  inp && inp.addEventListener('input', () => updateSetting(ctrl.id, inp.type==='checkbox'?inp.checked:inp.value, target, ttype));
  return div;
}

function updateSetting(key, value, target, ttype) {
  if (ttype==='element') {
    if(!target.settings)target.settings={};
    target.settings[key]=value;
    // Update preview only
    const elEl = document.querySelector(`.ab-el[data-element-id="${target.id}"] .el-preview`);
    if (elEl) elEl.innerHTML = getPreview(target);
  } else if (ttype==='section') {
    if(!target.settings)target.settings={};
    target.settings[key]=value;
    const secEl = document.querySelector(`.ab-section[data-section-id="${target.id}"]`);
    if(secEl&&key==='bg_color')secEl.style.background=value;
    if(secEl&&key==='padding')secEl.style.padding=value;
  }
  // debounced history push
  clearTimeout(window._histTimer);
  window._histTimer = setTimeout(()=>pushHistory(), 600);
}

/* =====================================================================
   HISTORY
   ===================================================================== */
function pushHistory() { history = history.slice(0,hCursor+1); history.push(deep(data)); if(history.length>60)history.shift(); hCursor=history.length-1; }
function undo() { if(hCursor<=0)return; hCursor--; data=deep(history[hCursor]); render(); showToast('Undone',''); }
function doRedo() { if(hCursor>=history.length-1)return; hCursor++; data=deep(history[hCursor]); render(); showToast('Redone',''); }
function commit() { render(); pushHistory(); markDirty(); }

/* =====================================================================
   RESPONSIVE VIEW
   ===================================================================== */
function setView(v) {
  const canvas = document.getElementById('canvas');
  canvas.className = 'canvas' + (v!=='desktop'?' '+v:'');
  ['desktop','tablet','mobile'].forEach(id => document.getElementById('v-'+id).classList.toggle('active',id===v));
}

/* =====================================================================
   MODAL
   ===================================================================== */
function openModal(cb) {
  modalCb = cb;
  const grid = document.getElementById('layout-grid');
  if (!grid._built) {
    grid._built = true;
    LAYOUTS.forEach(l => {
      const opt = document.createElement('div'); opt.className='layout-opt';
      const prev = document.createElement('div'); prev.className='layout-preview';
      l.cols.forEach(c=>{const d=document.createElement('div');d.style.flex=c.f;prev.appendChild(d);});
      const nm = document.createElement('div'); nm.className='layout-name'; nm.textContent=l.label;
      opt.appendChild(prev); opt.appendChild(nm);
      opt.onclick=()=>{ closeModal(); if(modalCb)modalCb(l.key); };
      grid.appendChild(opt);
    });
  }
  document.getElementById('modal').style.display='flex';
}
function closeModal() { document.getElementById('modal').style.display='none'; }

/* =====================================================================
   SAVE
   ===================================================================== */
let dirty = false;
function markDirty() { dirty=true; document.getElementById('save-status').textContent='Unsaved changes'; }
function save() {
  document.getElementById('save-status').textContent='Saving...';
  setTimeout(()=>{
    dirty=false;
    document.getElementById('save-status').textContent='All changes saved';
    showToast('✓ Saved!','success');
  }, 700);
}

/* =====================================================================
   LAYOUT TREE
   ===================================================================== */
function rebuildTree() {
  const tree = document.getElementById('layout-tree'); if(!tree)return; tree.innerHTML='';
  data.sections.forEach((sec,si)=>{
    const sh=document.createElement('div'); sh.style.cssText='padding:5px 8px;background:rgba(255,255,255,.04);border-radius:6px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--text);margin-bottom:2px;';
    sh.textContent=`▸ Section ${si+1}`; sh.onclick=()=>selectSection(sec.id); tree.appendChild(sh);
    const ch=document.createElement('div'); ch.style.cssText='padding-left:14px;';
    (sec.rows||[]).forEach((row,ri)=>{
      const rh=document.createElement('div'); rh.style.cssText='padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;'; rh.textContent=`↳ Row ${ri+1}`; ch.appendChild(rh);
      (row.columns||[]).forEach(col=>{(col.elements||[]).forEach(e=>{const eh=document.createElement('div');eh.style.cssText='padding:2px 8px 2px 20px;font-size:10.5px;color:var(--muted);cursor:pointer;';eh.textContent=`• ${ELEMENTS[e.type]?.label||e.type}`;eh.onclick=()=>selectElement(e.id);ch.appendChild(eh);});});
    });
    tree.appendChild(ch);
  });
}

/* =====================================================================
   UTILS
   ===================================================================== */
function showToast(msg, type) {
  const t = document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function switchTab(name, btn) {
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  ['elements','layout','page'].forEach(n=>{ const el=document.getElementById('panel-'+n); if(el)el.style.display=n===name?'':'none'; });
}

/* =====================================================================
   KEYBOARD
   ===================================================================== */
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();save();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();doRedo();}
});
